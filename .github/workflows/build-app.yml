name: Fitness Tracker Docker build

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    concurrency:
      group: fitness-tracker-ghcr
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set image name
        id: prep
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/andrejhristovski/Fitness-Tracker" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.image }}
          tags: |
            type=raw,value=latest,enable=${{ github.event_name != 'release' }}
            type=raw,value=${{ github.event.release.tag_name }},enable=${{ github.event_name == 'release' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Clean untagged GHCR image versions
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          token: ${{ github.token }}
          owner: ${{ github.repository_owner }}
          repository: andrejhristovski/Fitness-Tracker
          packages: andrejhristovski/Fitness-Tracker
          delete-untagged: true